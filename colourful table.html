<!DOCTYPE html>
<html>
<head>
    <title>Colorful Table</title>
    <style>
        table {border-collapse: collapse; width: 60%; margin: 20px auto;}
        th, td {padding: 10px; border: 2px solid #4CAF50; text-align: center;}
        th {background-color: #4CAF50; color: white;}
        tr:nth-child(even) {background-color: #f2f2f2;}
        tr:hover {background-color: #ffd699;}
    </style>
</head>
<body>
    <h2 style="text-align:center;">Student Marks</h2>
    <table>
        <tr>
            <th>Name</th><th>Math</th><th>Science</th>
        </tr>
        <tr><td>Rahul</td><td>90</td><td>85</td></tr>
        <tr><td>Sita</td><td>95</td><td>92</td></tr>
        <tr><td>Ravi</td><td>88</td><td>80</td></tr>
    </table>
</body>
</html>
